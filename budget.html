%%html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Budget Thresholds</title>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=ABeeZee:ital@0;1&family=Abhaya+Libre:wght@800&family=Abril+Fatface&family=Mitr:wght@400;700&family=Istok+Web:wght@400;700&family=Intel+One+Mono&family=Irish+Grover&family=Inclusive+Sans&family=Iceland&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .budget-container {
            background-color: #111111;
            width: 100%;
            max-width: 500px;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.05);
        }

        .header {
            margin-bottom: 25px;
        }

        .header h1, .header p {
            font-family: 'Indie Flower', cursive !important;
            color: #ff0000;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .header p {
            font-size: 18px;
            margin-top: 4px;
        }

        .budget-row {
            margin-bottom: 25px;
        }

        .row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .category {
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
        }

        .limit-box {
            background: #222;
            border: 1px solid #444;
            padding: 4px 14px;
            border-radius: 4px;
            color: #ffffff;
            font-weight: bold;
        }

        /* Row 1 Limit (Default Mitr) */
        .dining .limit-box { font-family: 'Mitr', sans-serif !important; }
        /* Row 2 Limit (Intel One Mono) */
        .groceries .limit-box { font-family: 'Intel One Mono', monospace !important; }
        /* Row 3 Limit (Inclusive Sans) */
        .entertainment .limit-box { font-family: 'Inclusive Sans', sans-serif !important; }

        .progress-bar-container {
            background: #333;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill { height: 100%; }

        .dining .progress-fill { width: 82%; background: #0052cc; }
        .groceries .progress-fill { width: 75%; background: #008000; }
        .entertainment .progress-fill { width: 99%; background: #ff0000; }

        .row-bottom {
            text-align: right;
            margin-top: 5px;
            font-weight: bold;
            color: #ffffff;
        }

        /* Row 1 Summary (Default Istok Web) */
        .dining .row-bottom { font-family: 'Istok Web', sans-serif !important; }
        /* Row 2 Summary (Irish Grover) */
        .groceries .row-bottom { font-family: 'Irish Grover', cursive !important; }
        /* Row 3 Summary (Iceland) */
        .entertainment .row-bottom { font-family: 'Iceland', cursive !important; }

        .danger-text {
            font-size: 15px;
            margin-top: 4px;
        }

        .green-icon {
            color: #008000;
            filter: drop-shadow(0 0 1px #008000);
        }

        /* Custom Warning Styles */
        .dining .danger-text {
            font-family: 'ABeeZee', sans-serif;
            color: #0000ff;
        }
        .groceries .danger-text {
            font-family: 'Abhaya Libre', serif;
            font-weight: 800;
            color: #008000;
        }
        .entertainment .danger-text {
            font-family: 'Abril Fatface', cursive;
            color: #ff0000;
        }
    </style>
</head>
<body>
    <div class="budget-container">
        <div class="header">
            <h1>Monthly Budget Thresholds</h1>
            <p>Set, monitor, and adjust spendings.</p>
        </div>

        <div class="budget-row dining">
             <div class="row-top"><div class="category">🍽️ Dining & Restaurants</div><div class="limit-box">₹2000</div></div>
            <div class="progress-bar-container"><div class="progress-fill"></div></div>
            <div class="row-bottom">₹1650 of ₹2000</div>
            <div class="danger-text">you have spent 82%</div>
        </div>

        <div class="budget-row groceries">
            <div class="row-top"><div class="category"><span class="green-icon">🛒</span> groceries</div><div class="limit-box">₹6000</div></div>
            <div class="progress-bar-container"><div class="progress-fill"></div></div>
            <div class="row-bottom">₹4500 of ₹6000</div>
            <div class="danger-text">this looks great</div>
        </div>

        <div class="budget-row entertainment">
            <div class="row-top"><div class="category">🎬 Entertainment</div><div class="limit-box">₹1000</div></div>
            <div class="progress-bar-container"><div class="progress-fill"></div></div>
            <div class="row-bottom">₹990 of ₹1000</div>
            <div class="danger-text">you have spent 99%</div>
        </div>
    </div>
</body>
</html>
